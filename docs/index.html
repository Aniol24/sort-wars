<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Tok — Sorting Algorithm Visualizations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #04040c; color: #e0e0e0; font-family: 'Courier New', monospace; }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 3rem; color: #00ff8c; letter-spacing: 0.1em; margin-bottom: 1rem; }
    .sub { font-size: 1.2rem; color: #8888aa; max-width: 600px; line-height: 1.7; }
    .bars { display: flex; align-items: flex-end; gap: 4px; margin: 2.5rem 0; height: 80px; }
    .bar { width: 16px; border-radius: 3px 3px 0 0; }
    .links { margin-top: 2rem; display: flex; gap: 2rem; }
    .links a { color: #00ff8c; text-decoration: none; font-size: 0.9rem; border-bottom: 1px solid #00ff8c44; padding-bottom: 2px; }
    .links a:hover { color: #fff; border-color: #fff; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="bars">
      <div class="bar" style="height:20%;background:#00ff8c"></div>
      <div class="bar" style="height:45%;background:#00e07a"></div>
      <div class="bar" style="height:30%;background:#00c068"></div>
      <div class="bar" style="height:70%;background:#00ff8c"></div>
      <div class="bar" style="height:55%;background:#ff3c5a"></div>
      <div class="bar" style="height:90%;background:#ff3c5a"></div>
      <div class="bar" style="height:65%;background:#ff3c5a"></div>
      <div class="bar" style="height:80%;background:#00ff8c"></div>
      <div class="bar" style="height:40%;background:#00e07a"></div>
      <div class="bar" style="height:100%;background:#ff3c5a"></div>
    </div>
    <h1>auto-tok</h1>
    <p class="sub">
      Daily sorting algorithm duels — two algorithms competing in real time,
      visualized and posted automatically to TikTok.
    </p>
    <div class="links">
      <a href="tos.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
